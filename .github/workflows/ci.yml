name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  go:
    name: Go vet & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: server/go.mod
          cache-dependency-path: server/go.sum

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build ./...

      - name: Test
        run: go test -race ./...

      - name: Lint
        uses: golangci/golangci-lint-action@v6
        with:
          working-directory: server

  client:
    name: TypeScript type-check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npx tsc --noEmit

  onnx-smoke:
    name: ONNX model smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache models
        id: model-cache
        uses: actions/cache@v4
        with:
          path: |
            model/yolov8n.onnx
            model/midas_small.onnx
          key: onnx-models-${{ hashFiles('tools/export.py') }}-v1

      - name: Export YOLO model (cache miss)
        if: steps.model-cache.outputs.cache-hit != 'true'
        run: |
          pip install --quiet ultralytics onnx onnxslim
          python tools/export.py

      - name: Download MiDaS model (cache miss)
        if: steps.model-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p model
          curl -fsSL https://github.com/isl-org/MiDaS/releases/download/v2_1/model-small.onnx \
            -o model/midas_small.onnx

      - name: Install smoke test dependencies
        run: pip install --quiet onnxruntime numpy

      - name: Run smoke test
        run: python tools/smoke_test.py
